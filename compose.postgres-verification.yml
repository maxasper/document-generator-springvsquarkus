services:
  postgres:
    image: postgres:16-alpine
    container_name: document-generator-postgres-verification
    environment:
      POSTGRES_DB: document_generator
      POSTGRES_USER: document_generator
      POSTGRES_PASSWORD: document_generator
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U document_generator -d document_generator"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
