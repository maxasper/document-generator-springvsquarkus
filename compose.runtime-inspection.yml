name: document-generator-runtime-inspection

services:
  postgres:
    image: postgres:16-alpine
    container_name: document-generator-postgres-runtime-inspection
    environment:
      POSTGRES_DB: document_generator
      POSTGRES_USER: document_generator
      POSTGRES_PASSWORD: document_generator
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U document_generator -d document_generator"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s

  spring-jvm:
    image: document-generator-spring-jvm-inspection:latest
    container_name: document-generator-spring-jvm-inspection
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DOCUMENT_GENERATOR_POSTGRES_HOST: postgres
      DOCUMENT_GENERATOR_POSTGRES_PORT: 5432
      DOCUMENT_GENERATOR_POSTGRES_DATABASE: document_generator
      DOCUMENT_GENERATOR_POSTGRES_USER: document_generator
      DOCUMENT_GENERATOR_POSTGRES_PASSWORD: document_generator
      JAVA_TOOL_OPTIONS: >-
        -Dcom.sun.management.jmxremote=true
        -Dcom.sun.management.jmxremote.local.only=false
        -Dcom.sun.management.jmxremote.port=${DG_SPRING_JMX_PORT:-9010}
        -Dcom.sun.management.jmxremote.rmi.port=${DG_SPRING_JMX_PORT:-9010}
        -Dcom.sun.management.jmxremote.authenticate=false
        -Dcom.sun.management.jmxremote.ssl=false
        -Djava.rmi.server.hostname=127.0.0.1
        -XX:MaxRAMPercentage=${DG_RUNTIME_MAX_RAM_PERCENTAGE:-75.0}
    ports:
      - "18080:8080"
      - "${DG_SPRING_JMX_PORT:-9010}:${DG_SPRING_JMX_PORT:-9010}"
    cpus: "${DG_RUNTIME_CPUS:-2.0}"
    mem_limit: "${DG_RUNTIME_MEMORY:-768m}"
    pids_limit: ${DG_RUNTIME_PIDS_LIMIT:-256}

  quarkus-jvm:
    image: document-generator-quarkus-jvm-inspection:latest
    container_name: document-generator-quarkus-jvm-inspection
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_PROFILE: postgres
      QUARKUS_HTTP_PORT: 8081
      DOCUMENT_GENERATOR_POSTGRES_HOST: postgres
      DOCUMENT_GENERATOR_POSTGRES_PORT: 5432
      DOCUMENT_GENERATOR_POSTGRES_DATABASE: document_generator
      DOCUMENT_GENERATOR_POSTGRES_USER: document_generator
      DOCUMENT_GENERATOR_POSTGRES_PASSWORD: document_generator
      JAVA_TOOL_OPTIONS: >-
        -Dcom.sun.management.jmxremote=true
        -Dcom.sun.management.jmxremote.local.only=false
        -Dcom.sun.management.jmxremote.port=${DG_QUARKUS_JMX_PORT:-9011}
        -Dcom.sun.management.jmxremote.rmi.port=${DG_QUARKUS_JMX_PORT:-9011}
        -Dcom.sun.management.jmxremote.authenticate=false
        -Dcom.sun.management.jmxremote.ssl=false
        -Djava.rmi.server.hostname=127.0.0.1
        -XX:MaxRAMPercentage=${DG_RUNTIME_MAX_RAM_PERCENTAGE:-75.0}
    ports:
      - "18081:8081"
      - "${DG_QUARKUS_JMX_PORT:-9011}:${DG_QUARKUS_JMX_PORT:-9011}"
    cpus: "${DG_RUNTIME_CPUS:-2.0}"
    mem_limit: "${DG_RUNTIME_MEMORY:-768m}"
    pids_limit: ${DG_RUNTIME_PIDS_LIMIT:-256}

  k6:
    image: grafana/k6:0.49.0
    user: "0:0"
    working_dir: /workspace
    volumes:
      - .:/workspace:ro
      - ./target/runtime-load-testing:/results
